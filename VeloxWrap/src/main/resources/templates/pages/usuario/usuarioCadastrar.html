<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{homeScreen/fragments/header :: header(
        ${usuario != null and usuario.idUsuario > 0}
        ? 'Alterar Usuario'
        : 'Criar Usuario')}">
</head>

<link rel="stylesheet" th:href="@{/css/velox.css}">

<body>

<nav th:replace="~{homeScreen/fragments/menu :: menu}"></nav>

<div class="container py-5 mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-5 col-md-7">

            <div class="glass-card text-white p-5">

                <h2 class="text-center mb-5 text-info fw-bold"
                    style="text-shadow: 0 0 30px #00d4ff;">

                    <span th:if="${usuario != null and usuario.idUsuario > 0}">
                        Alterar Usuário
                    </span>

                    <span th:unless="${usuario != null and usuario.idUsuario > 0}">
                        Criar Conta
                    </span>

                </h2>

                <form id="formUsuario">

                    <!-- ID -->
                    <input type="hidden"
                           id="idUsuario"
                           name="idUsuario"
                           th:value="${usuario.idUsuario}">

                    <!-- NOME -->
                    <div class="mb-4">
                        <label class="form-label">Nome</label>
                        <input type="text"
                               id="nome"
                               name="nome"
                               class="form-control form-control-lg bg-transparent text-white border-info"
                               placeholder="Nome completo"
                               th:value="${usuario.nome}"
                               required>
                    </div>

                    <!-- EMAIL -->
                    <div class="mb-4">
                        <label class="form-label">Email</label>
                        <input type="email"
                               name="email"
                               class="form-control form-control-lg bg-transparent text-white border-info"
                               placeholder="E-mail"
                               th:value="${usuario.email}"
                               required>
                    </div>

                    <!-- CPF -->
                    <div class="mb-4">
                        <label class="form-label" for="cpf">CPF</label>

                        <input type="text"
                               id="cpf"
                               name="cpf"
                               class="form-control form-control-lg bg-transparent text-white border-info"
                               placeholder="000.000.000-00"
                               maxlength="14"
                               th:value="${usuario != null ? usuario.cpf : ''}"
                               required>
                    </div>

                    <!-- DATA NASCIMENTO -->
                    <div class="mb-4">
                        <label class="form-label">Data de Nascimento</label>

                        <input type="date"
                               name="dataNascimento"
                               class="form-control form-control-lg bg-transparent text-white border-info"
                               th:value="${usuario.dataNascimento != null ? usuario.dataNascimento.toString() : ''}"
                               required>
                    </div>

                    <!-- SENHA -->
                    <div class="mb-4">
                        <label class="form-label">Senha</label>

                        <input type="password"
                               name="senha"
                               id="senha"
                               class="form-control form-control-lg bg-transparent text-white border-info"
                               th:placeholder="${usuario != null and usuario.idUsuario > 0}
                               ? ''
                               : 'Senha'"
                               th:required="${usuario == null or usuario.idUsuario == 0}">
                    </div>

                    <!-- BOTÕES -->
                    <div class="text-center mt-4">

                        <button class="btn btn-outline-info btn-lg px-5 border-2 fw-bold me-3"
                                type="submit">

                            <span th:if="${usuario != null and usuario.idUsuario > 0}">
                                Atualizar Usuário
                            </span>

                            <span th:unless="${usuario != null and usuario.idUsuario > 0}">
                                Criar Conta
                            </span>

                        </button>

                        <a href="/usuarios"
                           class="btn btn-outline-danger btn-lg px-5 border-2 fw-bold">
                            Cancelar
                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<!-- JS -->
<script th:src="@{/js/usuario/usuarioCadastrar.js}"></script>

<footer th:replace="~{homeScreen/fragments/footer :: footer}"></footer>

</body>
</html>
