<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{homeScreen/fragments/header :: header(
    ${veiculo != null and veiculo.idVeiculo > 0}
    ? 'Alterar Veículo'
    : 'Cadastrar Veículo'
)}">
</head>

<link rel="stylesheet" th:href="@{/css/veiculoCadastrar.css}">

<body>

<nav th:replace="~{homeScreen/fragments/menu :: menu}"></nav>

<div class="container py-5 mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-6 col-md-8 col-sm-11">

            <div class="glass-card text-white p-5">

                <h2 class="text-center mb-5 text-info fw-bold title-glow">

                    <span th:if="${veiculo != null and veiculo.idVeiculo > 0}">
                        Alterar Veículo
                    </span>

                    <span th:unless="${veiculo != null and veiculo.idVeiculo > 0}">
                        Cadastrar Veículo
                    </span>

                </h2>

                <form id="formVeiculo">

                    <input type="hidden"
                           id="idVeiculo"
                           name="idVeiculo"
                           th:value="${veiculo != null ? veiculo.idVeiculo : ''}">

                    <div class="mb-4">
                        <label class="form-label">
                            Usuário
                        </label>

                        <select name="idUsuario"
                                class="form-select form-select-lg bg-transparent text-white border-info"
                                required>

                            <option value="">
                                Selecione um usuário
                            </option>

                            <option th:each="u : ${usuarios}"
                                    th:value="${u.idUsuario}"
                                    th:text="${u.nome}"
                                    th:selected="${veiculo != null
                                    and veiculo.usuario != null
                                    and veiculo.usuario.idUsuario == u.idUsuario}">
                            </option>

                        </select>
                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Modelo
                        </label>

                        <select name="idModelo"
                                class="form-select form-select-lg bg-transparent text-white border-info"
                                required>

                            <option value="">
                                Selecione um modelo
                            </option>

                            <option th:each="m : ${modelos}"
                                    th:value="${m.idModelo}"
                                    th:text="${m.marca.nomeMarca + ' ' + m.nomeModelo + ' (' + m.anoLancamento + ')'}"
                                    th:selected="${veiculo != null
                                    and veiculo.modelo != null
                                    and veiculo.modelo.idModelo == m.idModelo}">
                            </option>

                        </select>
                    </div>

                    <div class="mb-4">

                        <label for="placa" class="form-label">
                            Placa
                        </label>

                        <input type="text"
                               id="placa"
                               name="placa"
                               class="form-control form-control-lg bg-transparent text-white border-info text-uppercase"
                               placeholder="ABC1D23"
                               maxlength="8"
                               autocomplete="off"
                               pattern="^([A-Z]{3}-?[0-9]{4}|[A-Z]{3}[0-9][A-Z][0-9]{2})$"
                               title="Placa inválida. Ex: AAA-1234 ou ABC1D23."
                               th:value="${veiculo != null ? veiculo.placa : ''}"
                               required>

                    </div>

                    <div class="mb-4">

                        <label for="cor" class="form-label">
                            Cor
                        </label>

                        <input type="text"
                               id="cor"
                               name="cor"
                               class="form-control form-control-lg bg-transparent text-white border-info"
                               placeholder="Digite a cor do veículo"
                               maxlength="30"
                               autocomplete="off"
                               th:value="${veiculo != null ? veiculo.cor : ''}"
                               required>

                    </div>

                    <div class="text-center mt-5">

                        <button type="submit"
                                class="btn btn-outline-info btn-lg px-5 border-2 fw-bold me-3">
                            <span th:if="${veiculo != null and veiculo.idVeiculo > 0}">
                                Atualizar Veículo
                            </span>
                            <span th:unless="${veiculo != null and veiculo.idVeiculo > 0}">
                                Cadastrar Veículo
                            </span>
                        </button>

                        <a href="/veiculos"
                           class="btn btn-outline-danger btn-lg px-5 border-2 fw-bold">
                            Cancelar
                        </a>

                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/veiculo/veiculoCadastrar.js}"></script>

<footer th:replace="~{homeScreen/fragments/footer :: footer}"></footer>

</body>
</html>
