<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org">

<head>
  <th:block th:replace="~{homeScreen/fragments/header :: header('Usuários')}"></th:block>
</head>

<body>

<nav th:replace="~{homeScreen/fragments/menu :: menu}"></nav>

<div class="container-fluid mt-4">

  <div class="card shadow mb-4">
    <div class="card-body">

      <h1 class="h3 mb-2 text-gray-800">Usuários</h1>
      <p class="mb-4">Gerenciamento completo de usuários do sistema</p>

      <a class="btn btn-success mb-3"
         th:href="@{/NovoUsuario}">
        <i class="fas fa-user-plus"></i>
        Novo Usuário
      </a>

    </div>
  </div>

  <div class="card shadow">
    <div class="card-body">

      <div class="table-responsive">

        <table id="datatable" class="table table-bordered table-hover" width="100%">

          <thead class="thead-dark">
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>CPF</th>
            <th>E-mail</th>
            <th>Nascimento</th>
            <th>Ações</th>
          </tr>
          </thead>

          <tbody>

          <tr th:each="usuario : ${usuarios}">

            <td class="text-center" th:text="${usuario.idUsuario}"></td>

            <td th:text="${usuario.nome}"></td>

            <td class="cpf" th:text="${usuario.cpf}"></td>

            <td th:text="${usuario.email}"></td>

            <td class="text-center"
                th:text="${usuario.dataNascimento != null ? #temporals.format(usuario.dataNascimento, 'dd/MM/yyyy') : ''}">
            </td>

            <!-- AÇÕES -->
            <td class="text-center">

              <a th:href="@{/usuario/editar/{id}(id=${usuario.idUsuario})}"
                 class="btn btn-warning btn-sm">
                <i class="fas fa-edit"></i>
              </a>

              <button class="btn btn-danger btn-sm"
                      th:onclick="'deletar(' + ${usuario.idUsuario} + ')'">
                <i class="fas fa-trash"></i>
              </button>

            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script th:src="@{/js/usuario/usuarioListar.js}"></script>

<footer th:replace="~{homeScreen/fragments/footer :: footer}"></footer>

</body>
</html>
